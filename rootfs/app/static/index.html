<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Trading Dashboard v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Urbanist:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #13171f;
            --bg-hover: #1a1f2b;
            --border: #252a35;
            --text-primary: #e6e8eb;
            --text-secondary: #8b92a0;
            --accent-green: #00ff87;
            --accent-red: #ff3366;
            --accent-blue: #00d4ff;
            --accent-orange: #ff9500;
            --accent-purple: #a78bfa;
            --accent-yellow: #ffd700;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Urbanist', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
        }
        
        .dashboard-container {
            max-width: 1900px;
            margin: 0 auto;
            padding: 40px 30px;
        }
        
        .header {
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #00ff87 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .header .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 300;
        }
        
        /* Tabs */
        .tabs-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }
        
        .tabs-header {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        
        .tab-button {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
            position: relative;
        }
        
        .tab-button.active {
            color: var(--accent-green);
            background: rgba(0, 255, 135, 0.1);
        }
        
        .tab-button:hover {
            background: var(--bg-hover);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .trade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-hover);
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        
        .trade-item-left {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .trade-item-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .profit-positive {
            color: var(--accent-green);
        }
        
        .profit-negative {
            color: var(--accent-red);
        }
        
        .view-all-button {
            width: 100%;
            padding: 12px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }
        
        .view-all-button:hover {
            background: var(--bg-card);
            border-color: var(--accent-blue);
        }
        
        /* Tables */
        .category-section {
            margin-bottom: 40px;
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 700;
        }
        
        .category-icon {
            font-size: 24px;
        }
        
        .category-count {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 400;
        }
        
        .accounts-table {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .accounts-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .accounts-table th {
            background: var(--bg-hover);
            padding: 16px 12px;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        
        .accounts-table th:hover {
            background: var(--bg-dark);
        }
        
        .accounts-table th.sortable::after {
            content: '⇅';
            position: absolute;
            right: 8px;
            opacity: 0.3;
        }
        
        .accounts-table th.sorted-asc::after {
            content: '↑';
            opacity: 1;
            color: var(--accent-blue);
        }
        
        .accounts-table th.sorted-desc::after {
            content: '↓';
            opacity: 1;
            color: var(--accent-blue);
        }
        
        .accounts-table td {
            padding: 16px 12px;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        
        .accounts-table tr:hover td {
            background: var(--bg-hover);
        }
        
        .type-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .type-live {
            background: rgba(0, 255, 135, 0.2);
            color: var(--accent-green);
        }
        
        .type-demo {
            background: rgba(255, 149, 0, 0.2);
            color: var(--accent-orange);
        }
        
        .type-copy {
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent-blue);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* Settings Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-header h2 {
            font-size: 24px;
            font-weight: 700;
        }
        
        .close-button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
        }
        
        .close-button:hover {
            color: var(--text-primary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        
        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .button {
            flex: 1;
            padding: 12px 24px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .button-primary {
            background: var(--accent-green);
            color: var(--bg-dark);
            border-color: var(--accent-green);
        }
        
        .button-primary:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        
        .button-danger {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
        }
        
        .button-danger:hover {
            background: #cc0044;
        }
        
        .button-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .button-secondary:hover {
            background: var(--bg-dark);
        }
        
        .settings-button {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent-blue);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            z-index: 100;
        }
        
        .settings-button:hover {
            background: var(--accent-green);
            transform: rotate(90deg);
        }
        
        .account-item {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .account-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .account-name {
            font-size: 18px;
            font-weight: 700;
        }
        
        .currency-display {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 36px;
            }
            
            .accounts-table {
                overflow-x: auto;
            }
            
            .accounts-table table {
                min-width: 1200px;
            }
            
            .trade-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .trade-item-right {
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="header">
            <h1>EA Trading Dashboard</h1>
            <div class="subtitle">Multi-Account Übersicht - Alle Expert Advisors</div>
        </div>
        
        <!-- Live/Today Trades Tabs -->
        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-button active" data-tab="live-trades">
                    🔴 LIVE TRADES <span id="liveCount">(0)</span>
                </button>
                <button class="tab-button" data-tab="today-trades">
                    📅 HEUTE <span id="todayCount">(0)</span>
                </button>
            </div>
            
            <div class="tab-content active" id="live-trades">
                <div id="liveTradesContent"></div>
            </div>
            
            <div class="tab-content" id="today-trades">
                <div id="todayTradesContent"></div>
            </div>
        </div>
        
        <!-- Live Accounts Table -->
        <div class="category-section" id="liveSection">
            <div class="category-header">
                <span class="category-icon">🟢</span>
                <span>LIVE KONTEN</span>
                <span class="category-count" id="liveAccountsCount">(0)</span>
            </div>
            <div class="accounts-table" id="liveAccountsTable"></div>
        </div>
        
        <!-- Copy Trading Accounts Table -->
        <div class="category-section" id="copySection">
            <div class="category-header">
                <span class="category-icon">🔵</span>
                <span>COPY TRADING</span>
                <span class="category-count" id="copyAccountsCount">(0)</span>
            </div>
            <div class="accounts-table" id="copyAccountsTable"></div>
        </div>
        
        <!-- Demo Accounts Table -->
        <div class="category-section" id="demoSection">
            <div class="category-header">
                <span class="category-icon">🟠</span>
                <span>DEMO KONTEN</span>
                <span class="category-count" id="demoAccountsCount">(0)</span>
            </div>
            <div class="accounts-table" id="demoAccountsTable"></div>
        </div>
        
        <!-- Settings Button -->
        <button class="settings-button" onclick="openSettings()">⚙️</button>
        
        <!-- Settings Modal -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>⚙️ Einstellungen</h2>
                    <button class="close-button" onclick="closeSettings()">×</button>
                </div>
                
                <div class="form-group">
                    <label>Anzeige-Währung</label>
                    <select id="displayCurrency" onchange="updateDisplayCurrency()">
                        <option value="USD">US Dollar ($)</option>
                        <option value="EUR">Euro (€)</option>
                        <option value="BOTH">Beide anzeigen</option>
                    </select>
                </div>
                
                <hr style="border: none; border-top: 1px solid var(--border); margin: 24px 0;">
                
                <h3 style="margin-bottom: 16px;">Konten verwalten</h3>
                <div id="accountsManagement"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Global state
        let allAccounts = [];
        let exchangeRate = 1.0;
        let displayCurrency = 'USD';
        let sortColumn = null;
        let sortDirection = 'asc';
        
        // Get API base URL (works with both direct access and Ingress)
        function getApiUrl(endpoint) {
            // Check if we're in Ingress mode
            const path = window.location.pathname;
            if (path.includes('_ea-dashboard')) {
                // Ingress mode: extract base path
                const match = path.match(/^(\/[^\/]+_ea-dashboard)/);
                if (match) {
                    return match[1] + endpoint;
                }
            }
            // Direct mode: use relative URL
            return endpoint;
        }
        
        // Initialize
        async function init() {
            await loadData();
            setupTabs();
            setupEventListeners();
        }
        
        // Load all data
        async function loadData() {
            try {
                const [accountsRes, liveRes, todayRes, settingsRes] = await Promise.all([
                    fetch(getApiUrl('/api/accounts')),
                    fetch(getApiUrl('/api/live-trades')),
                    fetch(getApiUrl('/api/today-trades')),
                    fetch(getApiUrl('/api/settings'))
                ]);
                
                const accountsData = await accountsRes.json();
                const liveData = await liveRes.json();
                const todayData = await todayRes.json();
                const settingsData = await settingsRes.json();
                
                if (accountsData.success) {
                    allAccounts = accountsData.accounts;
                    exchangeRate = accountsData.exchange_rate || 1.0;
                }
                
                if (settingsData.success) {
                    displayCurrency = settingsData.settings.display_currency || 'USD';
                    document.getElementById('displayCurrency').value = displayCurrency;
                }
                
                renderLiveTrades(liveData.live_trades || [], liveData.total || 0);
                renderTodayTrades(todayData.today_trades || [], todayData.total || 0);
                renderAccountsTables();
                
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }
        
        // Format currency
        function formatCurrency(amount, currency = 'USD') {
            const symbol = currency === 'EUR' ? '€' : '$';
            const formatted = Math.abs(amount).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return `${amount < 0 ? '-' : ''}${symbol}${formatted}`;
        }
        
        // Convert and display currency
        function displayAmount(amount, accountCurrency = 'USD') {
            if (displayCurrency === 'BOTH') {
                const usd = accountCurrency === 'EUR' ? amount / exchangeRate : amount;
                const eur = accountCurrency === 'USD' ? amount * exchangeRate : amount;
                return `${formatCurrency(eur, 'EUR')} (≈${formatCurrency(usd, 'USD')})`;
            } else if (displayCurrency === accountCurrency) {
                return formatCurrency(amount, accountCurrency);
            } else {
                const converted = displayCurrency === 'EUR' ? amount * exchangeRate : amount / exchangeRate;
                return formatCurrency(converted, displayCurrency);
            }
        }
        
        // Format date
        function formatDate(dateStr) {
            try {
                // Remove microseconds for mobile compatibility
                const cleanDate = dateStr.split('.')[0];
                const date = new Date(cleanDate);
                return new Intl.DateTimeFormat('de-DE', {
                    day: '2-digit',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                }).format(date);
            } catch (e) {
                return 'Invalid Date';
            }
        }
        
        // Calculate duration
        function calculateDuration(openTime, closeTime) {
            try {
                const open = new Date(openTime.split('.')[0]);
                const close = closeTime ? new Date(closeTime.split('.')[0]) : new Date();
                const hours = Math.floor((close - open) / 3600000);
                const minutes = Math.floor(((close - open) % 3600000) / 60000);
                return hours > 0 ? `${hours}h` : `${minutes}m`;
            } catch (e) {
                return '-';
            }
        }
        
        // Render live trades
        function renderLiveTrades(trades, total) {
            document.getElementById('liveCount').textContent = `(${total})`;
            const container = document.getElementById('liveTradesContent');
            
            if (trades.length === 0) {
                container.innerHTML = '<div class="empty-state">Keine offenen Trades</div>';
                return;
            }
            
            let html = trades.slice(0, 10).map(trade => `
                <div class="trade-item">
                    <div class="trade-item-left">
                        <span style="color: var(--text-secondary);">${trade.account_name}</span>
                        <span style="font-weight: 700;">${trade.symbol}</span>
                        <span>${trade.type}</span>
                        <span>${trade.lots}</span>
                    </div>
                    <div class="trade-item-right">
                        <span class="${trade.profit >= 0 ? 'profit-positive' : 'profit-negative'}">
                            ${trade.profit >= 0 ? '+' : ''}${displayAmount(trade.profit)}
                        </span>
                        <span style="color: var(--text-secondary);">${calculateDuration(trade.open_time)}</span>
                    </div>
                </div>
            `).join('');
            
            if (total > 10) {
                html += `<button class="view-all-button">📊 Alle ${total} Live Trades anzeigen</button>`;
            }
            
            container.innerHTML = html;
        }
        
        // Render today trades
        function renderTodayTrades(trades, total) {
            document.getElementById('todayCount').textContent = `(${total})`;
            const container = document.getElementById('todayTradesContent');
            
            if (trades.length === 0) {
                container.innerHTML = '<div class="empty-state">Heute noch keine Trades geschlossen</div>';
                return;
            }
            
            let html = trades.slice(0, 10).map(trade => `
                <div class="trade-item">
                    <div class="trade-item-left">
                        <span style="color: var(--text-secondary);">${trade.account_name}</span>
                        <span style="font-weight: 700;">${trade.symbol}</span>
                        <span>${trade.type}</span>
                        <span>${trade.lots}</span>
                    </div>
                    <div class="trade-item-right">
                        <span class="${trade.profit >= 0 ? 'profit-positive' : 'profit-negative'}">
                            ${trade.profit >= 0 ? '+' : ''}${displayAmount(trade.profit)}
                        </span>
                        <span style="color: var(--text-secondary);">${formatDate(trade.close_time)}</span>
                    </div>
                </div>
            `).join('');
            
            if (total > 10) {
                html += `<button class="view-all-button">📊 Alle ${total} heutigen Trades anzeigen</button>`;
            }
            
            container.innerHTML = html;
        }
        
        // Render accounts tables
        function renderAccountsTables() {
            const liveAccounts = allAccounts.filter(a => a.category === 'live');
            const copyAccounts = allAccounts.filter(a => a.category === 'copy');
            const demoAccounts = allAccounts.filter(a => a.category === 'demo');
            
            document.getElementById('liveAccountsCount').textContent = `(${liveAccounts.length})`;
            document.getElementById('copyAccountsCount').textContent = `(${copyAccounts.length})`;
            document.getElementById('demoAccountsCount').textContent = `(${demoAccounts.length})`;
            
            renderAccountTable('liveAccountsTable', liveAccounts);
            renderAccountTable('copyAccountsTable', copyAccounts);
            renderAccountTable('demoAccountsTable', demoAccounts);
        }
        
        // Render single account table
        function renderAccountTable(containerId, accounts) {
            const container = document.getElementById(containerId);
            
            if (accounts.length === 0) {
                container.innerHTML = '<div class="empty-state">Keine Konten</div>';
                return;
            }
            
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th class="sortable" onclick="sortTable('name')">STRATEGY</th>
                            <th class="sortable" onclick="sortTable('type')">TYPE</th>
                            <th class="sortable" onclick="sortTable('broker')">BROKER</th>
                            <th class="sortable" onclick="sortTable('deposit')">DEPOSIT</th>
                            <th class="sortable" onclick="sortTable('current_balance')">BALANCE</th>
                            <th class="sortable" onclick="sortTable('floating_pl')">FLOATING P/L</th>
                            <th class="sortable" onclick="sortTable('withdrawals')">WITHDRAWALS</th>
                            <th class="sortable" onclick="sortTable('total_profit')">GAIN %</th>
                            <th class="sortable" onclick="sortTable('total_trades')">TRADES</th>
                            <th class="sortable" onclick="sortTable('days_running')">DAYS</th>
                            <th class="sortable" onclick="sortTable('profit_factor')">PF</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${accounts.map(acc => {
                            const gainPercent = acc.deposit > 0 ? ((acc.total_profit / acc.deposit) * 100) : 0;
                            return `
                            <tr>
                                <td style="font-weight: 700;">${acc.name}</td>
                                <td><span class="type-badge type-${acc.category}">${acc.type}</span></td>
                                <td>${acc.broker}</td>
                                <td>${displayAmount(acc.deposit, acc.currency)}</td>
                                <td style="font-weight: 700;">${displayAmount(acc.current_balance, acc.currency)}</td>
                                <td class="${acc.floating_pl >= 0 ? 'profit-positive' : 'profit-negative'}">
                                    ${displayAmount(acc.floating_pl, acc.currency)}
                                </td>
                                <td>${displayAmount(acc.withdrawals, acc.currency)}</td>
                                <td class="${gainPercent >= 0 ? 'profit-positive' : 'profit-negative'}">
                                    ${gainPercent >= 0 ? '+' : ''}${gainPercent.toFixed(2)}%
                                </td>
                                <td>${acc.total_trades}</td>
                                <td>${acc.days_running} days</td>
                                <td>${acc.profit_factor}</td>
                                <td>
                                    <button class="button button-secondary" style="padding: 6px 12px; font-size: 11px;" 
                                            onclick="editAccount(${acc.id})">✏️</button>
                                </td>
                            </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = html;
        }
        
        // Sort table
        function sortTable(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            
            allAccounts.sort((a, b) => {
                let aVal = a[column];
                let bVal = b[column];
                
                if (typeof aVal === 'string') {
                    return sortDirection === 'asc' 
                        ? aVal.localeCompare(bVal) 
                        : bVal.localeCompare(aVal);
                } else {
                    return sortDirection === 'asc' 
                        ? aVal - bVal 
                        : bVal - aVal;
                }
            });
            
            renderAccountsTables();
            
            // Update sort indicators
            document.querySelectorAll('.accounts-table th').forEach(th => {
                th.classList.remove('sorted-asc', 'sorted-desc');
            });
            
            const targetTh = event?.target;
            if (targetTh) {
                targetTh.classList.add(`sorted-${sortDirection}`);
            }
        }
        
        // Setup tabs
        function setupTabs() {
            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', () => {
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    button.classList.add('active');
                    document.getElementById(button.dataset.tab).classList.add('active');
                });
            });
        }
        
        // Setup event listeners
        function setupEventListeners() {
            // Auto-refresh every 10 seconds
            setInterval(loadData, 10000);
        }
        
        // Settings modal
        function openSettings() {
            loadAccountsManagement();
            document.getElementById('settingsModal').classList.add('active');
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        
        // Load accounts for management
        function loadAccountsManagement() {
            const container = document.getElementById('accountsManagement');
            
            const html = allAccounts.map(acc => `
                <div class="account-item">
                    <div class="account-item-header">
                        <span class="account-name">${acc.name}</span>
                        <span class="type-badge type-${acc.category}">${acc.category.toUpperCase()}</span>
                    </div>
                    
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" value="${acc.name}" id="name_${acc.id}">
                    </div>
                    
                    <div class="form-group">
                        <label>Broker</label>
                        <input type="text" value="${acc.broker}" id="broker_${acc.id}">
                    </div>
                    
                    <div class="form-group">
                        <label>Type</label>
                        <select id="type_${acc.id}">
                            <option value="Live" ${acc.type === 'Live' ? 'selected' : ''}>Live</option>
                            <option value="Demo" ${acc.type === 'Demo' ? 'selected' : ''}>Demo</option>
                            <option value="Copy" ${acc.type === 'Copy' ? 'selected' : ''}>Copy</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Kategorie</label>
                        <select id="category_${acc.id}">
                            <option value="live" ${acc.category === 'live' ? 'selected' : ''}>🟢 Live</option>
                            <option value="copy" ${acc.category === 'copy' ? 'selected' : ''}>🔵 Copy Trading</option>
                            <option value="demo" ${acc.category === 'demo' ? 'selected' : ''}>🟠 Demo</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Währung</label>
                        <select id="currency_${acc.id}">
                            <option value="USD" ${acc.currency === 'USD' ? 'selected' : ''}>US Dollar ($)</option>
                            <option value="EUR" ${acc.currency === 'EUR' ? 'selected' : ''}>Euro (€)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Startkapital (Deposit)</label>
                        <input type="number" step="0.01" value="${acc.deposit || ''}" 
                               id="deposit_${acc.id}" ${acc.deposit ? '' : ''}>
                        <span class="currency-display">Manuell eintragbar wenn nicht automatisch erkannt</span>
                    </div>
                    
                    <div class="button-group">
                        <button class="button button-primary" onclick="saveAccount(${acc.id})">💾 Speichern</button>
                        <button class="button button-danger" onclick="deleteAccount(${acc.id})">🗑️ Löschen</button>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        // Save account
        async function saveAccount(accountId) {
            const updates = {
                name: document.getElementById(`name_${accountId}`).value,
                broker: document.getElementById(`broker_${accountId}`).value,
                type: document.getElementById(`type_${accountId}`).value,
                category: document.getElementById(`category_${accountId}`).value,
                currency: document.getElementById(`currency_${accountId}`).value,
                deposit: parseFloat(document.getElementById(`deposit_${accountId}`).value) || null
            };
            
            try {
                const response = await fetch(getApiUrl(`/api/accounts/${accountId}`), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                
                if (response.ok) {
                    alert('✅ Konto gespeichert!');
                    await loadData();
                    loadAccountsManagement();
                }
            } catch (error) {
                alert('❌ Fehler beim Speichern');
            }
        }
        
        // Delete account
        async function deleteAccount(accountId) {
            if (!confirm('Konto wirklich löschen? Trade-Historie bleibt erhalten.')) {
                return;
            }
            
            try {
                const response = await fetch(getApiUrl(`/api/accounts/${accountId}`), {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('✅ Konto gelöscht!');
                    await loadData();
                    closeSettings();
                }
            } catch (error) {
                alert('❌ Fehler beim Löschen');
            }
        }
        
        // Edit account (quick access)
        function editAccount(accountId) {
            openSettings();
            setTimeout(() => {
                document.getElementById(`name_${accountId}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }
        
        // Update display currency
        async function updateDisplayCurrency() {
            displayCurrency = document.getElementById('displayCurrency').value;
            
            try {
                await fetch(getApiUrl('/api/settings'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_currency: displayCurrency })
                });
                
                renderAccountsTables();
            } catch (error) {
                console.error('Failed to update currency');
            }
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
