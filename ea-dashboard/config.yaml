name: "EA Trading Dashboard"
description: "v4.8.1 - Complete UI: table settings, sortable columns, restructured dashboard"
version: "4.8.1"
slug: ea-dashboard
init: false
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
ports:
  8099/tcp: 8099
webui: "http://[HOST]:[PORT:8099]"
ingress: true
ingress_port: 8099
panel_icon: mdi:chart-line
startup: application
boot: auto
options:
  webhook_secret: ""
  log_level: "normal"
schema:
  webhook_secret: password?
  log_level: list(normal|debug)?
