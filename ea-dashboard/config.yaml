name: "EA Trading Dashboard"
description: "v4.8.0 - Table settings, sortable columns, manual deposits, restructured UI"
version: "4.8.0"
slug: ea-dashboard
init: false
arch: [armhf, armv7, aarch64, amd64, i386]
ports: {8099/tcp: 8099}
webui: "http://[HOST]:[PORT:8099]"
ingress: true
ingress_port: 8099
panel_icon: mdi:chart-line
startup: application
boot: auto
options:
  webhook_secret: ""
  log_level: "normal"
schema:
  webhook_secret: password?
  log_level:
    type: list
    options:
      - "normal"
      - "debug"
    default: "normal"
    description: "Normal = essential logs only, Debug = detailed webhook logging"
