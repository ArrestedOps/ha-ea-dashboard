<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>EA Dashboard v4.0</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e14;--card:#13171f;--hover:#1a1f2b;--border:#252a35;--text:#e6e8eb;--sec:#8b92a0;--green:#00ff87;--red:#ff3366;--blue:#00d4ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:80px}
.container{max-width:1900px;margin:0 auto;padding:clamp(16px,4vw,40px)}
.header{margin-bottom:clamp(20px,4vw,40px)}
.header h1{font-size:clamp(28px,6vw,48px);font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,200px),1fr));gap:clamp(12px,2vw,20px);margin-bottom:clamp(16px,3vw,30px)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:clamp(16px,3vw,24px)}
.stat-label{font-size:clamp(10px,2vw,11px);font-family:'JetBrains Mono';color:var(--sec);text-transform:uppercase;margin-bottom:8px}
.stat-value{font-size:clamp(24px,5vw,32px);font-weight:700}
.trades-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,280px),1fr));gap:clamp(12px,2vw,20px);margin-bottom:clamp(16px,3vw,30px)}
.trades-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:clamp(16px,3vw,24px)}
.section-header{display:flex;justify-content:space-between;margin-bottom:12px;font-family:'JetBrains Mono';font-weight:700;font-size:clamp(12px,2.5vw,14px)}
.trade-item{display:flex;justify-content:space-between;padding:12px;background:var(--hover);border-radius:8px;margin-bottom:8px;font-family:'JetBrains Mono';font-size:clamp(11px,2.2vw,12px);flex-wrap:wrap;gap:8px}
.trade-item>div:first-child{flex:1;min-width:120px}
.section-total{border-top:2px solid var(--border);padding-top:12px;margin-top:12px;display:flex;justify-content:space-between;font-family:'JetBrains Mono';font-weight:700;font-size:clamp(12px,2.5vw,14px)}
.positive{color:var(--green)}.negative{color:var(--red)}
.category-section{margin-bottom:clamp(24px,4vw,40px)}
.category-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;font-size:clamp(16px,3.5vw,20px);font-weight:700;flex-wrap:wrap}
.table-wrap{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:600px}
th{background:var(--hover);padding:clamp(12px,2vw,16px) clamp(8px,1.5vw,12px);text-align:left;font-family:'JetBrains Mono';font-size:clamp(9px,1.8vw,11px);font-weight:600;color:var(--sec);text-transform:uppercase;white-space:nowrap}
td{padding:clamp(12px,2vw,16px) clamp(8px,1.5vw,12px);border-top:1px solid var(--border);font-family:'JetBrains Mono';font-size:clamp(11px,2.2vw,13px);white-space:nowrap}
tr:hover td{background:var(--hover)}
.account-link{color:var(--blue);text-decoration:none;cursor:pointer}
.account-link:hover{color:var(--green);text-decoration:underline}
.total-row{background:var(--hover);border-top:2px solid var(--green)}
.total-row td{font-weight:700;color:var(--green)}
.broker-col{display:table-cell}
@media(max-width:768px){
.broker-col{display:none}
table{min-width:500px}
}
.settings-btn{position:relative;bottom:0;right:0;width:48px;height:48px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:20px;cursor:pointer;box-shadow:0 4px 8px rgba(0,0,0,0.2);margin:40px auto 20px;display:block}
.settings-btn:hover{background:var(--green)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal.active{display:flex}
.modal-content{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:clamp(20px,4vw,32px);max-width:600px;width:100%;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;margin-bottom:24px;align-items:center}
.close-btn{background:none;border:none;color:var(--sec);font-size:24px;cursor:pointer;padding:0;min-width:40px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;font-size:13px;font-weight:600;color:var(--sec)}
.form-group input{width:100%;padding:12px;background:var(--hover);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono';font-size:13px}
.btn{padding:12px 24px;border-radius:8px;font-family:'JetBrains Mono';font-size:clamp(12px,2.5vw,13px);cursor:pointer;border:none;margin-right:8px;margin-bottom:8px}
.btn-primary{background:var(--green);color:var(--bg)}
.btn-danger{background:var(--red);color:white}
.empty{text-align:center;padding:clamp(24px,4vw,40px);color:var(--sec)}
.detail-page{display:none}
.detail-page.active{display:block}
.back-btn{margin-bottom:20px;padding:12px 20px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'JetBrains Mono';font-size:clamp(12px,2.5vw,14px);display:inline-block;border:none}
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:clamp(16px,3vw,24px);margin-top:20px}
.chart-container h3{margin-bottom:16px;font-size:clamp(16px,3vw,18px)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,140px),1fr));gap:clamp(12px,2vw,16px);margin-top:20px}
.info-card{background:var(--hover);padding:clamp(12px,2.5vw,16px);border-radius:8px}
.info-label{font-size:clamp(9px,1.8vw,10px);font-family:'JetBrains Mono';color:var(--sec);margin-bottom:4px}
.info-value{font-size:clamp(14px,3vw,16px);font-weight:600}
.trades-list{margin-top:20px;max-height:500px;overflow-y:auto}
</style>
</head>
<body>
<div class="container">
<div id="overviewPage">
<div class="header">
<h1>EA Trading Dashboard</h1>
<div style="color:var(--sec);margin-top:8px;font-size:clamp(12px,2.5vw,14px)">v4.0 Final Perfect</div>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="stat-label">💰 BALANCE</div><div class="stat-value" id="totalBalance">$0</div></div>
<div class="stat-card"><div class="stat-label">📈 PROFIT</div><div class="stat-value" id="totalProfit">$0</div></div>
<div class="stat-card"><div class="stat-label">🎯 ACCOUNTS</div><div class="stat-value" id="totalAccounts">0</div></div>
<div class="stat-card"><div class="stat-label">📊 TRADES</div><div class="stat-value" id="totalTrades">0</div></div>
</div>
<div class="trades-grid">
<div class="trades-section"><div class="section-header"><div>🔴 LIVE</div><div id="liveCount">(0)</div></div><div id="liveContent"></div><div class="section-total"><span>TOTAL:</span><span id="liveTotalPL">$0</span></div></div>
<div class="trades-section"><div class="section-header"><div>📅 TODAY</div><div id="todayCount">(0)</div></div><div id="todayContent"></div><div class="section-total"><span>TOTAL:</span><span id="todayTotalPL">$0</span></div></div>
</div>
<div class="category-section">
<div class="category-header"><span>🟢</span>LIVE <span id="liveAccCount" style="color:var(--sec);font-size:clamp(14px,3vw,16px)">(0)</span></div>
<div class="table-wrap" id="liveTable"></div>
</div>
<div class="category-section">
<div class="category-header"><span>🔵</span>COPY <span id="copyAccCount" style="color:var(--sec);font-size:clamp(14px,3vw,16px)">(0)</span></div>
<div class="table-wrap" id="copyTable"></div>
</div>
<div class="category-section">
<div class="category-header"><span>🟠</span>DEMO <span id="demoAccCount" style="color:var(--sec);font-size:clamp(14px,3vw,16px)">(0)</span></div>
<div class="table-wrap" id="demoTable"></div>
</div>
<button class="settings-btn" onclick="openSettings()">⚙️</button>
</div>
<div id="detailPage" class="detail-page">
<button class="back-btn" onclick="showOverview()">← Back</button>
<div id="detailContent"></div>
</div>
<div class="modal" id="settingsModal">
<div class="modal-content">
<div class="modal-header"><h2>⚙️ Settings</h2><button class="close-btn" onclick="closeSettings()">×</button></div>
<div class="form-group"><label>Webhook Secret</label><input type="password" id="secretKey" placeholder="Secret key"></div>
<div id="accountsManagement"></div>
</div>
</div>
</div>
<script>
let allAccounts=[],equityChart=null;
function getApiUrl(e){return'.'+e}
function fmt(v){return(v>=0?'':'- ')+'$'+Math.abs(v).toFixed(2)}
async function loadData(){try{const[a,l,t]=await Promise.all([fetch(getApiUrl('/api/accounts')),fetch(getApiUrl('/api/live-trades')),fetch(getApiUrl('/api/today-trades'))]);const ad=await a.json(),ld=await l.json(),td=await t.json();if(ad.success){allAccounts=ad.accounts;renderStats(ad.totals);renderTables();}renderLive(ld.live_trades||[],ld.total||0,ld.total_pl||0);renderToday(td.today_trades||[],td.total||0,td.total_pl||0);}catch(e){console.error(e);}}
function renderStats(t){document.getElementById('totalBalance').textContent=fmt(t.total_balance);document.getElementById('totalProfit').textContent=fmt(t.total_profit);document.getElementById('totalProfit').className='stat-value '+(t.total_profit>=0?'positive':'negative');document.getElementById('totalAccounts').textContent=t.total_accounts;document.getElementById('totalTrades').textContent=t.total_trades;}
function renderLive(ts,tot,pl){document.getElementById('liveCount').textContent=`(${tot})`;document.getElementById('liveTotalPL').textContent=fmt(pl);document.getElementById('liveTotalPL').className=pl>=0?'positive':'negative';const c=document.getElementById('liveContent');if(!ts.length){c.innerHTML='<div class="empty">No live</div>';return;}c.innerHTML=ts.map(t=>`<div class="trade-item"><div>${t.account_name} - ${t.symbol}</div><div class="${t.profit>=0?'positive':'negative'}">${fmt(t.profit)}</div></div>`).join('');}
function renderToday(ts,tot,pl){document.getElementById('todayCount').textContent=`(${tot})`;document.getElementById('todayTotalPL').textContent=fmt(pl);document.getElementById('todayTotalPL').className=pl>=0?'positive':'negative';const c=document.getElementById('todayContent');if(!ts.length){c.innerHTML='<div class="empty">No trades</div>';return;}c.innerHTML=ts.map(t=>`<div class="trade-item"><div>${t.account_name} - ${t.symbol}</div><div class="${t.profit>=0?'positive':'negative'}">${fmt(t.profit)}</div></div>`).join('');}
function renderTables(){const live=allAccounts.filter(a=>a.category==='live');const copy=allAccounts.filter(a=>a.category==='copy');const demo=allAccounts.filter(a=>a.category==='demo');document.getElementById('liveAccCount').textContent=`(${live.length})`;document.getElementById('copyAccCount').textContent=`(${copy.length})`;document.getElementById('demoAccCount').textContent=`(${demo.length})`;renderTable('liveTable',live);renderTable('copyTable',copy);renderTable('demoTable',demo);}
function renderTable(id,accs){const c=document.getElementById(id);if(!accs.length){c.innerHTML='<div class="empty">No accounts</div>';return;}const tDep=accs.reduce((s,a)=>s+a.deposit,0);const tBal=accs.reduce((s,a)=>s+a.current_balance,0);const tPro=accs.reduce((s,a)=>s+a.total_profit,0);const tTra=accs.reduce((s,a)=>s+a.total_trades,0);c.innerHTML=`<table><thead><tr><th>NAME</th><th class="broker-col">BROKER</th><th>DEPOSIT</th><th>BALANCE</th><th>PROFIT</th><th>GAIN %</th><th>TRADES</th><th>WIN %</th><th>PF</th><th>DD</th><th>DAYS</th></tr></thead><tbody>${accs.map(a=>`<tr><td><a class="account-link" onclick="showDetail(${a.id})">${a.name}</a></td><td class="broker-col">${a.broker}</td><td>${fmt(a.deposit)}</td><td>${fmt(a.current_balance)}</td><td class="${a.total_profit>=0?'positive':'negative'}">${fmt(a.total_profit)}</td><td class="${a.gain_percent>=0?'positive':'negative'}">${a.gain_percent>=0?'+':''}${a.gain_percent}%</td><td>${a.total_trades}</td><td>${a.win_rate}%</td><td>${a.profit_factor}</td><td>${a.max_drawdown}%</td><td>${a.days_running}</td></tr>`).join('')}<tr class="total-row"><td>TOTAL</td><td class="broker-col"></td><td>${fmt(tDep)}</td><td>${fmt(tBal)}</td><td class="${tPro>=0?'positive':'negative'}">${fmt(tPro)}</td><td></td><td>${tTra}</td><td></td><td></td><td></td><td></td></tr></tbody></table>`;}
async function showDetail(id){try{const res=await fetch(getApiUrl(`/api/accounts/${id}`));const data=await res.json();if(!data.success)return;const acc=allAccounts.find(a=>a.id===id);document.getElementById('overviewPage').style.display='none';document.getElementById('detailPage').classList.add('active');document.getElementById('detailContent').innerHTML=`<h1 style="font-size:clamp(28px,5vw,36px);font-weight:900;margin-bottom:20px">${acc.name}</h1><div class="stats-grid"><div class="stat-card"><div class="stat-label">BALANCE</div><div class="stat-value">${fmt(acc.current_balance)}</div></div><div class="stat-card"><div class="stat-label">PROFIT</div><div class="stat-value ${acc.total_profit>=0?'positive':'negative'}">${fmt(acc.total_profit)}</div></div><div class="stat-card"><div class="stat-label">GAIN</div><div class="stat-value ${acc.gain_percent>=0?'positive':'negative'}">${acc.gain_percent>=0?'+':''}${acc.gain_percent}%</div></div><div class="stat-card"><div class="stat-label">TRADES</div><div class="stat-value">${acc.total_trades}</div></div></div><div class="info-grid"><div class="info-card"><div class="info-label">DEPOSIT</div><div class="info-value">${fmt(acc.deposit)}</div></div><div class="info-card"><div class="info-label">DEPOSITS</div><div class="info-value positive">${fmt(acc.total_deposits||0)}</div></div><div class="info-card"><div class="info-label">WITHDRAWALS</div><div class="info-value negative">${fmt(acc.total_withdrawals||0)}</div></div><div class="info-card"><div class="info-label">PF</div><div class="info-value">${acc.profit_factor}</div></div><div class="info-card"><div class="info-label">WIN %</div><div class="info-value">${acc.win_rate}%</div></div><div class="info-card"><div class="info-label">AVG WIN</div><div class="info-value positive">${fmt(acc.avg_win)}</div></div><div class="info-card"><div class="info-label">AVG LOSS</div><div class="info-value negative">${fmt(acc.avg_loss)}</div></div><div class="info-card"><div class="info-label">BEST</div><div class="info-value positive">${fmt(acc.best_trade)}</div></div><div class="info-card"><div class="info-label">WORST</div><div class="info-value negative">${fmt(acc.worst_trade)}</div></div><div class="info-card"><div class="info-label">AVG DUR</div><div class="info-value">${acc.avg_trade_duration.toFixed(1)}h</div></div><div class="info-card"><div class="info-label">MAX DD</div><div class="info-value negative">${acc.max_drawdown}%</div></div><div class="info-card"><div class="info-label">LEVERAGE</div><div class="info-value">1:${acc.leverage||0}</div></div></div><div class="chart-container"><h3>Equity Curve</h3><canvas id="equityChart"></canvas></div><div class="chart-container"><h3>Top Symbols</h3><div id="symbolStats"></div></div><div class="chart-container"><h3>All Trades (${data.account.trades?.length||0})</h3><div class="trades-list" id="allTradesList"></div></div>`;renderEquityChart(data.equity_curve);renderSymbolStats(data.symbols);renderAllTrades(data.account.trades||[]);}catch(e){console.error(e);}}
function renderEquityChart(eq){const ctx=document.getElementById('equityChart');if(equityChart)equityChart.destroy();equityChart=new Chart(ctx,{type:'line',data:{labels:eq.map(e=>new Date(e.date).toLocaleDateString('de-DE')),datasets:[{label:'Balance',data:eq.map(e=>e.balance),borderColor:'#00ff87',backgroundColor:'rgba(0,255,135,0.1)',fill:true,tension:0.4}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#8b92a0'},grid:{color:'#252a35'}},x:{ticks:{color:'#8b92a0',maxRotation:45,minRotation:0},grid:{color:'#252a35'}}}}});}
function renderSymbolStats(syms){const c=document.getElementById('symbolStats');if(!syms.length){c.innerHTML='<div class="empty">No data</div>';return;}c.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>SYMBOL</th><th>TRADES</th><th>PROFIT</th><th>WIN %</th></tr></thead><tbody>${syms.slice(0,10).map(s=>`<tr><td>${s.symbol}</td><td>${s.count}</td><td class="${s.profit>=0?'positive':'negative'}">${fmt(s.profit)}</td><td>${s.win_rate}%</td></tr>`).join('')}</tbody></table></div>`;}
function renderAllTrades(trades){const c=document.getElementById('allTradesList');if(!trades.length){c.innerHTML='<div class="empty">No trades</div>';return;}const sorted=trades.sort((a,b)=>new Date(b.close_time)-new Date(a.close_time));c.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>TIME</th><th>SYMBOL</th><th>TYPE</th><th>LOTS</th><th>PROFIT</th></tr></thead><tbody>${sorted.map(t=>`<tr><td style="font-size:10px">${new Date(t.close_time).toLocaleDateString('de-DE')}</td><td>${t.symbol}</td><td>${t.type}</td><td>${t.lots}</td><td class="${t.profit>=0?'positive':'negative'}">${fmt(t.profit)}</td></tr>`).join('')}</tbody></table></div>`;}
function showOverview(){document.getElementById('detailPage').classList.remove('active');document.getElementById('overviewPage').style.display='block';}
function openSettings(){document.getElementById('settingsModal').classList.add('active');loadAccountsManagement();}
function closeSettings(){document.getElementById('settingsModal').classList.remove('active');}
function loadAccountsManagement(){const c=document.getElementById('accountsManagement');c.innerHTML='<hr style="border:none;border-top:1px solid var(--border);margin:24px 0"><h3 style="margin-bottom:16px">Accounts</h3>'+allAccounts.map(a=>`<div style="background:var(--hover);padding:16px;border-radius:8px;margin:16px 0"><h4>${a.name}</h4><div class="form-group"><label>Deposit</label><input type="number" value="${a.deposit}" id="dep_${a.id}"></div><button class="btn btn-primary" onclick="saveAccount(${a.id})">Save</button><button class="btn btn-danger" onclick="deleteAccount(${a.id})">Delete</button></div>`).join('');}
async function saveAccount(id){const dep=document.getElementById(`dep_${id}`).value;try{await fetch(getApiUrl(`/api/accounts/${id}`),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({deposit:parseFloat(dep)})});alert('✅ Saved!');await loadData();}catch(e){alert('❌ Error');}}
async function deleteAccount(id){if(!confirm('Delete?'))return;try{await fetch(getApiUrl(`/api/accounts/${id}`),{method:'DELETE'});alert('✅ Deleted!');closeSettings();await loadData();}catch(e){alert('❌ Error');}}
loadData();setInterval(loadData,10000);
</script>
</body>
</html>
