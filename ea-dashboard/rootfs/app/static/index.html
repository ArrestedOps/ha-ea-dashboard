<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Trading Dashboard v3.2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Urbanist:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #13171f;
            --bg-hover: #1a1f2b;
            --border: #252a35;
            --text-primary: #e6e8eb;
            --text-secondary: #8b92a0;
            --accent-green: #00ff87;
            --accent-red: #ff3366;
            --accent-blue: #00d4ff;
            --accent-orange: #ff9500;
            --accent-purple: #a78bfa;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Urbanist', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
        }
        
        .dashboard-container {
            max-width: 1900px;
            margin: 0 auto;
            padding: 40px 30px;
        }
        
        .header {
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #00ff87 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .header .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 300;
        }
        
        /* Overview Stats */
        .overview-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
        
        .stat-label {
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-change {
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }
        
        /* Tabs */
        .tabs-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }
        
        .tabs-header {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        
        .tab-button {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }
        
        .tab-button.active {
            color: var(--accent-green);
            background: rgba(0, 255, 135, 0.1);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-hover);
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        
        /* Tables */
        .category-section {
            margin-bottom: 40px;
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 700;
        }
        
        .accounts-table {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow-x: auto;
        }
        
        .accounts-table table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1400px;
        }
        
        .accounts-table th {
            background: var(--bg-hover);
            padding: 16px 12px;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .accounts-table td {
            padding: 16px 12px;
            border-top: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        
        .accounts-table tr:hover td {
            background: var(--bg-hover);
        }
        
        .type-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .type-live { background: rgba(0, 255, 135, 0.2); color: var(--accent-green); }
        .type-demo { background: rgba(255, 149, 0, 0.2); color: var(--accent-orange); }
        .type-copy { background: rgba(0, 212, 255, 0.2); color: var(--accent-blue); }
        
        .account-name-link {
            color: var(--accent-blue);
            text-decoration: none;
            cursor: pointer;
        }
        
        .account-name-link:hover {
            color: var(--accent-green);
            text-decoration: underline;
        }
        
        /* Settings */
        .settings-button {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent-blue);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }
        
        .settings-button:hover {
            background: var(--accent-green);
            transform: rotate(90deg);
            transition: all 0.3s;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .close-button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }
        
        .button {
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
        
        .button-primary {
            background: var(--accent-green);
            color: var(--bg-dark);
        }
        
        .button-danger {
            background: var(--accent-red);
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* Detail Page */
        .detail-page {
            display: none;
        }
        
        .detail-page.active {
            display: block;
        }
        
        .back-button {
            margin-bottom: 20px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 32px; }
            .overview-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Overview Page -->
        <div id="overviewPage">
            <div class="header">
                <h1>EA Trading Dashboard</h1>
                <div class="subtitle">Multi-Account Übersicht v3.2</div>
            </div>
            
            <!-- Overview Stats -->
            <div class="overview-stats">
                <div class="stat-card">
                    <div class="stat-label">💰 Gesamt Balance</div>
                    <div class="stat-value" id="totalBalance">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">📈 Gesamt Profit</div>
                    <div class="stat-value" id="totalProfit">$0.00</div>
                    <div class="stat-change" id="totalProfitChange">+0.00%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">🎯 Konten</div>
                    <div class="stat-value" id="totalAccounts">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">📊 Gesamt Trades</div>
                    <div class="stat-value" id="totalTrades">0</div>
                </div>
            </div>
            
            <!-- Live/Today Trades -->
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-button active" data-tab="live">🔴 LIVE <span id="liveCount">(0)</span></button>
                    <button class="tab-button" data-tab="today">📅 HEUTE <span id="todayCount">(0)</span></button>
                </div>
                <div class="tab-content active" id="live"></div>
                <div class="tab-content" id="today"></div>
            </div>
            
            <!-- Live Accounts -->
            <div class="category-section">
                <div class="category-header">
                    <span>🟢</span> LIVE KONTEN <span id="liveAccountsCount" style="color: var(--text-secondary); font-size: 16px;">(0)</span>
                </div>
                <div class="accounts-table" id="liveTable"></div>
            </div>
            
            <!-- Copy Trading -->
            <div class="category-section">
                <div class="category-header">
                    <span>🔵</span> COPY TRADING <span id="copyAccountsCount" style="color: var(--text-secondary); font-size: 16px;">(0)</span>
                </div>
                <div class="accounts-table" id="copyTable"></div>
            </div>
            
            <!-- Demo -->
            <div class="category-section">
                <div class="category-header">
                    <span>🟠</span> DEMO KONTEN <span id="demoAccountsCount" style="color: var(--text-secondary); font-size: 16px;">(0)</span>
                </div>
                <div class="accounts-table" id="demoTable"></div>
            </div>
        </div>
        
        <!-- Detail Page -->
        <div id="detailPage" class="detail-page">
            <button class="back-button" onclick="showOverview()">← Zurück zur Übersicht</button>
            <div id="detailContent"></div>
        </div>
        
        <!-- Settings Button -->
        <button class="settings-button" onclick="openSettings()">⚙️</button>
        
        <!-- Settings Modal -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>⚙️ Einstellungen</h2>
                    <button class="close-button" onclick="closeSettings()">×</button>
                </div>
                <div class="form-group">
                    <label>Anzeige-Währung</label>
                    <select id="displayCurrency" onchange="updateCurrency()">
                        <option value="USD">US Dollar ($)</option>
                        <option value="EUR">Euro (€)</option>
                        <option value="BOTH">Beide anzeigen</option>
                    </select>
                </div>
                <hr style="border: none; border-top: 1px solid var(--border); margin: 24px 0;">
                <h3>Konten verwalten</h3>
                <div id="accountsManagement"></div>
            </div>
        </div>
    </div>
    
    <script>
        let allAccounts = [];
        let exchangeRate = 1.0;
        let displayCurrency = 'USD';
        
        function getApiUrl(endpoint) {
            return '.' + endpoint;
        }
        
        async function loadData() {
            try {
                const [accountsRes, liveRes, todayRes, settingsRes] = await Promise.all([
                    fetch(getApiUrl('/api/accounts')),
                    fetch(getApiUrl('/api/live-trades')),
                    fetch(getApiUrl('/api/today-trades')),
                    fetch(getApiUrl('/api/settings'))
                ]);
                
                const accountsData = await accountsRes.json();
                const liveData = await liveRes.json();
                const todayData = await todayRes.json();
                const settingsData = await settingsRes.json();
                
                if (accountsData.success) {
                    allAccounts = accountsData.accounts;
                    exchangeRate = accountsData.exchange_rate || 1.0;
                    renderOverviewStats(accountsData.totals);
                    renderAccountsTables();
                }
                
                if (settingsData.success) {
                    displayCurrency = settingsData.settings.display_currency || 'USD';
                    document.getElementById('displayCurrency').value = displayCurrency;
                }
                
                renderLiveTrades(liveData.live_trades || [], liveData.total || 0);
                renderTodayTrades(todayData.today_trades || [], todayData.total || 0);
                
            } catch (error) {
                console.error('Failed to load data:', error);
            }
        }
        
        function formatCurrency(amount) {
            const symbol = displayCurrency === 'EUR' ? '€' : '$';
            return symbol + Math.abs(amount).toFixed(2);
        }
        
        function renderOverviewStats(totals) {
            document.getElementById('totalBalance').textContent = formatCurrency(totals.total_balance);
            document.getElementById('totalProfit').textContent = formatCurrency(totals.total_profit);
            document.getElementById('totalProfit').className = 'stat-value ' + (totals.total_profit >= 0 ? 'positive' : 'negative');
            document.getElementById('totalAccounts').textContent = totals.total_accounts;
            document.getElementById('totalTrades').textContent = totals.total_trades;
        }
        
        function renderLiveTrades(trades, total) {
            document.getElementById('liveCount').textContent = `(${total})`;
            const container = document.getElementById('live');
            
            if (trades.length === 0) {
                container.innerHTML = '<div class="empty-state">Keine offenen Trades</div>';
                return;
            }
            
            container.innerHTML = trades.map(t => `
                <div class="trade-item">
                    <div>${t.account_name} - ${t.symbol} ${t.type} ${t.lots}</div>
                    <div class="${t.profit >= 0 ? 'positive' : 'negative'}">${formatCurrency(t.profit)}</div>
                </div>
            `).join('');
        }
        
        function renderTodayTrades(trades, total) {
            document.getElementById('todayCount').textContent = `(${total})`;
            const container = document.getElementById('today');
            
            if (trades.length === 0) {
                container.innerHTML = '<div class="empty-state">Heute keine Trades</div>';
                return;
            }
            
            container.innerHTML = trades.map(t => `
                <div class="trade-item">
                    <div>${t.account_name} - ${t.symbol}</div>
                    <div class="${t.profit >= 0 ? 'positive' : 'negative'}">${formatCurrency(t.profit)}</div>
                </div>
            `).join('');
        }
        
        function renderAccountsTables() {
            const live = allAccounts.filter(a => a.category === 'live');
            const copy = allAccounts.filter(a => a.category === 'copy');
            const demo = allAccounts.filter(a => a.category === 'demo');
            
            document.getElementById('liveAccountsCount').textContent = `(${live.length})`;
            document.getElementById('copyAccountsCount').textContent = `(${copy.length})`;
            document.getElementById('demoAccountsCount').textContent = `(${demo.length})`;
            
            renderTable('liveTable', live);
            renderTable('copyTable', copy);
            renderTable('demoTable', demo);
        }
        
        function renderTable(containerId, accounts) {
            const container = document.getElementById(containerId);
            
            if (accounts.length === 0) {
                container.innerHTML = '<div class="empty-state">Keine Konten</div>';
                return;
            }
            
            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>NAME</th>
                            <th>BROKER</th>
                            <th>DEPOSIT</th>
                            <th>BALANCE</th>
                            <th>PROFIT</th>
                            <th>GAIN %</th>
                            <th>TRADES</th>
                            <th>WIN RATE</th>
                            <th>PF</th>
                            <th>DD</th>
                            <th>DAYS</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${accounts.map(acc => `
                            <tr>
                                <td><a class="account-name-link" onclick="showDetail(${acc.id})">${acc.name}</a></td>
                                <td>${acc.broker}</td>
                                <td>${formatCurrency(acc.deposit)}</td>
                                <td>${formatCurrency(acc.current_balance)}</td>
                                <td class="${acc.total_profit >= 0 ? 'positive' : 'negative'}">${formatCurrency(acc.total_profit)}</td>
                                <td class="${acc.gain_percent >= 0 ? 'positive' : 'negative'}">${acc.gain_percent >= 0 ? '+' : ''}${acc.gain_percent}%</td>
                                <td>${acc.total_trades}</td>
                                <td>${acc.win_rate}%</td>
                                <td>${acc.profit_factor}</td>
                                <td>${acc.max_drawdown}%</td>
                                <td>${acc.days_running}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function showDetail(accountId) {
            const account = allAccounts.find(a => a.id === accountId);
            if (!account) return;
            
            document.getElementById('overviewPage').style.display = 'none';
            document.getElementById('detailPage').classList.add('active');
            
            document.getElementById('detailContent').innerHTML = `
                <h1>${account.name}</h1>
                <div class="overview-stats">
                    <div class="stat-card">
                        <div class="stat-label">Balance</div>
                        <div class="stat-value">${formatCurrency(account.current_balance)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Profit</div>
                        <div class="stat-value ${account.total_profit >= 0 ? 'positive' : 'negative'}">${formatCurrency(account.total_profit)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Gain</div>
                        <div class="stat-value ${account.gain_percent >= 0 ? 'positive' : 'negative'}">${account.gain_percent >= 0 ? '+' : ''}${account.gain_percent}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Trades</div>
                        <div class="stat-value">${account.total_trades}</div>
                    </div>
                </div>
                <p style="color: var(--text-secondary); margin-top: 20px;">Detaillierte Statistiken und Charts folgen in Kürze...</p>
            `;
        }
        
        function showOverview() {
            document.getElementById('detailPage').classList.remove('active');
            document.getElementById('overviewPage').style.display = 'block';
        }
        
        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
            loadAccountsManagement();
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        
        function loadAccountsManagement() {
            const container = document.getElementById('accountsManagement');
            container.innerHTML = allAccounts.map(acc => `
                <div style="background: var(--bg-hover); padding: 16px; border-radius: 8px; margin: 16px 0;">
                    <h4>${acc.name}</h4>
                    <div class="form-group">
                        <label>Deposit</label>
                        <input type="number" value="${acc.deposit}" id="deposit_${acc.id}">
                    </div>
                    <button class="button button-primary" onclick="saveAccount(${acc.id})">Speichern</button>
                    <button class="button button-danger" onclick="deleteAccount(${acc.id})">Löschen</button>
                </div>
            `).join('');
        }
        
        async function saveAccount(accountId) {
            const deposit = document.getElementById(`deposit_${accountId}`).value;
            
            try {
                await fetch(getApiUrl(`/api/accounts/${accountId}`), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ deposit: parseFloat(deposit) })
                });
                
                alert('✅ Gespeichert!');
                await loadData();
            } catch (error) {
                alert('❌ Fehler!');
            }
        }
        
        async function deleteAccount(accountId) {
            if (!confirm('Wirklich löschen?')) return;
            
            try {
                await fetch(getApiUrl(`/api/accounts/${accountId}`), { method: 'DELETE' });
                alert('✅ Gelöscht!');
                closeSettings();
                await loadData();
            } catch (error) {
                alert('❌ Fehler!');
            }
        }
        
        async function updateCurrency() {
            displayCurrency = document.getElementById('displayCurrency').value;
            
            try {
                await fetch(getApiUrl('/api/settings'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_currency: displayCurrency })
                });
                
                await loadData();
            } catch (error) {
                console.error('Failed to update currency');
            }
        }
        
        // Tab switching
        document.querySelectorAll('.tab-button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });
        
        // Initialize
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
